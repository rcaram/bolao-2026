services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE_PLATFORM: ${NODE_IMAGE_PLATFORM:-linux/amd64}
    platform: ${NODE_IMAGE_PLATFORM:-linux/amd64}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      BACKEND_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bolao}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bolao}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bolao}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
