        topScorer:
          type: string
      required: [champion]

    BonusBet:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        bolaoId:
          type: integer
        champion:
          type: string
        topScorer:
          type: string
        championPoints:
          type: integer
        topScorerPoints:
          type: integer
        locked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, bolaoId, champion, locked, createdAt, updatedAt]
