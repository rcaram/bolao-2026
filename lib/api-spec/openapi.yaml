openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Bolão Copa 2026 - World Cup Betting Pool API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: groups
  - name: teams
  - name: matches
  - name: bets
  - name: rankings
  - name: admin
  - name: bonuses
  - name: boloes

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /groups:
    get:
      operationId: getGroups
      tags: [groups]
      summary: Get all groups with their teams
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupWithTeams"

  /teams:
    get:
      operationId: getTeams
      tags: [teams]
      summary: Get all teams
      parameters:
        - name: groupId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /matches:
    get:
      operationId: getMatches
      tags: [matches]
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [group, round_of_32, round_of_16, quarterfinal, semifinal, third_place, final]
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, live, finished]
        - name: groupId
          in: query
          schema:
            type: integer
        - name: bolaoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithBet"

  /matches/{matchId}:
    get:
      operationId: getMatch
      tags: [matches]
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
        - name: bolaoId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithBet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /boloes:
    get:
      operationId: getBoloes
      tags: [boloes]
      responses:
        "200":
          description: User boloes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bolao"
    post:
      operationId: createBolao
      tags: [boloes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBolaoRequest"
      responses:
        "201":
          description: Bolao created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolao"

  /boloes/join:
    post:
      operationId: joinBolao
      tags: [boloes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinBolaoRequest"
      responses:
        "200":
          description: Joined bolao
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolao"

  /boloes/{bolaoId}:
    get:
      operationId: getBolao
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bolao details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolao"
    put:
      operationId: updateBolao
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBolaoRequest"
      responses:
        "200":
          description: Bolao updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolao"
    delete:
      operationId: deleteBolao
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Bolao deleted

  /boloes/{bolaoId}/leave:
    post:
      operationId: leaveBolao
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Left bolao

  /boloes/{bolaoId}/members:
    get:
      operationId: getBolaoMembers
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bolao members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BolaoMember"

  /boloes/{bolaoId}/members/{userId}:
    delete:
      operationId: removeBolaoMember
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Member removed

  /boloes/{bolaoId}/members/{userId}/role:
    put:
      operationId: updateBolaoMemberRole
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBolaoMemberRoleRequest"
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BolaoMemberRoleUpdateResponse"

  /boloes/{bolaoId}/invite-code/regenerate:
    post:
      operationId: regenerateBolaoInviteCode
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invite code regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolao"

  /boloes/{bolaoId}/scoring-config:
    get:
      operationId: getBolaoScoringConfig
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bolao scoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfig"
    put:
      operationId: updateBolaoScoringConfig
      tags: [boloes]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoringConfig"
      responses:
        "200":
          description: Updated bolao scoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfig"

  /boloes/{bolaoId}/bets:
    post:
      operationId: submitBet
      tags: [bets]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitBetRequest"
      responses:
        "200":
          description: Bet submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
  /boloes/{bolaoId}/bets/my:
    get:
      operationId: getMyBets
      tags: [bets]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BetWithMatch"

  /boloes/{bolaoId}/bets/match/{matchId}:
    get:
      operationId: getMatchBets
      tags: [bets]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bets for match (visible after deadline)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BetWithUser"

  /boloes/{bolaoId}/rankings:
    get:
      operationId: getRankings
      tags: [rankings]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingEntry"

  /boloes/{bolaoId}/rankings/my:
    get:
      operationId: getMyRanking
      tags: [rankings]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: My ranking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRankingDetail"

  /boloes/{bolaoId}/bonuses:
    get:
      operationId: getMyBonusBets
      tags: [bonuses]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: My bonus bets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusBet"
    post:
      operationId: submitBonusBets
      tags: [bonuses]
      parameters:
        - name: bolaoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitBonusBetsRequest"
      responses:
        "200":
          description: Bonus bets submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusBet"

  /invite/{token}:
    get:
      operationId: validateInviteToken
      tags: [auth]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteValidationResponse"
        "404":
          description: Token not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/invite:
    post:
      operationId: createInvite
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"

  /admin/invites:
    get:
      operationId: listInvites
      tags: [admin]
      responses:
        "200":
          description: All invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"

  /admin/groups:
    post:
      operationId: createGroup
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /admin/teams:
    post:
      operationId: createTeam
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /admin/matches:
    post:
      operationId: createMatch
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchRequest"
      responses:
        "201":
          description: Match created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /admin/matches/{matchId}/result:
    put:
      operationId: updateMatchResult
      tags: [admin]
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMatchResultRequest"
      responses:
        "200":
          description: Result updated, scores recalculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "404":
          description: Match not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        inviteToken:
          type: string
      required: [email, password, name, inviteToken]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, participant]
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, role, createdAt]

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, participant]
        totalPoints:
          type: integer
        betsSubmitted:
          type: integer
      required: [id, email, name, role, totalPoints, betsSubmitted]

    CreateBolaoRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
        description:
          type: string
      required: [name]

    JoinBolaoRequest:
      type: object
      properties:
        inviteCode:
          type: string
      required: [inviteCode]

    Bolao:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        inviteCode:
          type: string
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, inviteCode, createdBy, createdAt]

    BolaoMember:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time
      required: [userId, name, email, role, joinedAt]

    UpdateBolaoMemberRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, member]
      required: [role]

    BolaoMemberRoleUpdateResponse:
      type: object
      properties:
        id:
          type: integer
        bolaoId:
          type: integer
        userId:
          type: integer
        role:
          type: string
          enum: [admin, member]
      required: [id, bolaoId, userId, role]

    ScoringConfig:
      type: object
      properties:
        exactScore:
          type: integer
        correctOutcomeGoalDiff:
          type: integer
        correctOutcome:
          type: integer
        wrongOutcome:
          type: integer
        bonusChampion:
          type: integer
        bonusTopScorer:
          type: integer
      required: [exactScore, correctOutcomeGoalDiff, correctOutcome, wrongOutcome, bonusChampion, bonusTopScorer]

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
      required: [id, name]

    GroupWithTeams:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            teams:
              type: array
              items:
                $ref: "#/components/schemas/Team"
          required: [teams]

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        flag:
          type: string
        fifaCode:
          type: string
        groupId:
          type: integer
        group:
          $ref: "#/components/schemas/Group"
      required: [id, name, fifaCode]

    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required: [name]

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
        flag:
          type: string
        fifaCode:
          type: string
        groupId:
          type: integer
      required: [name, fifaCode]

    CreateInviteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        expiresInDays:
          type: integer
          default: 7
      required: [email]

    InviteResponse:
      type: object
      properties:
        invite:
          $ref: "#/components/schemas/Invite"
        inviteUrl:
          type: string
      required: [invite, inviteUrl]

    Invite:
      type: object
      properties:
        id:
          type: integer
        bolaoId:
          type: integer
        email:
          type: string
        token:
          type: string
        used:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, email, token, used, expiresAt, createdAt]

    InviteValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        email:
          type: string
      required: [valid, email]

    CreateMatchRequest:
      type: object
      properties:
        homeTeamId:
          type: integer
        awayTeamId:
          type: integer
        homePlaceholder:
          type: string
        awayPlaceholder:
          type: string
        groupId:
          type: integer
        matchDate:
          type: string
          format: date-time
        stage:
          type: string
          enum: [group, round_of_32, round_of_16, quarterfinal, semifinal, third_place, final]
        matchNumber:
          type: integer
        venue:
          type: string
      required: [matchDate, stage]

    UpdateMatchResultRequest:
      type: object
      properties:
        homeScore:
          type: integer
          minimum: 0
        awayScore:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [upcoming, live, finished]
        homeTeamId:
          type: integer
        awayTeamId:
          type: integer
      required: [homeScore, awayScore, status]

    Match:
      type: object
      properties:
        id:
          type: integer
        homeTeamId:
          type: integer
        awayTeamId:
          type: integer
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        homePlaceholder:
          type: string
        awayPlaceholder:
          type: string
        groupId:
          type: integer
        group:
          $ref: "#/components/schemas/Group"
        matchDate:
          type: string
          format: date-time
        stage:
          type: string
          enum: [group, round_of_32, round_of_16, quarterfinal, semifinal, third_place, final]
        matchNumber:
          type: integer
        venue:
          type: string
        homeScore:
          type: integer
        awayScore:
          type: integer
        status:
          type: string
          enum: [upcoming, live, finished]
        bettingDeadline:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, matchDate, stage, status, bettingDeadline, createdAt]

    MatchWithBet:
      allOf:
        - $ref: "#/components/schemas/Match"
        - type: object
          properties:
            userBet:
              $ref: "#/components/schemas/Bet"

    SubmitBetRequest:
      type: object
      properties:
        matchId:
          type: integer
        homeScore:
          type: integer
          minimum: 0
        awayScore:
          type: integer
          minimum: 0
      required: [matchId, homeScore, awayScore]

    Bet:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        bolaoId:
          type: integer
        matchId:
          type: integer
        homeScore:
          type: integer
        awayScore:
          type: integer
        points:
          type: integer
        exactScore:
          type: boolean
        correctOutcome:
          type: boolean
        correctGoalDiff:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, bolaoId, matchId, homeScore, awayScore, createdAt, updatedAt]

    BetWithMatch:
      allOf:
        - $ref: "#/components/schemas/Bet"
        - type: object
          properties:
            match:
              $ref: "#/components/schemas/Match"

    BetWithUser:
      allOf:
        - $ref: "#/components/schemas/Bet"
        - type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
              required: [id, name]

    RankingEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        totalPoints:
          type: integer
        exactScores:
          type: integer
        correctOutcomes:
          type: integer
        bonusPoints:
          type: integer
        betsSubmitted:
          type: integer
        totalMatches:
          type: integer
      required: [rank, userId, userName, totalPoints, exactScores, correctOutcomes, bonusPoints, betsSubmitted, totalMatches]

    UserRankingDetail:
      allOf:
        - $ref: "#/components/schemas/RankingEntry"
        - type: object
          properties:
